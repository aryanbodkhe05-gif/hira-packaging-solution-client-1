name: Deploy to GitHub Pages

# Static SPA (frontend-only; auth + data live in the browser). Auto-deploys
# the github.io site on every push to main.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      # SPA fallback — GitHub Pages serves 404.html for unknown paths,
      # so deep links like /packflow-erp/orders load the app instead of erroring
      - name: Copy 404 fallback
        run: cp client/dist/index.html client/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
